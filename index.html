<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Anniversary ❤️</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.container{
z-index:10;
}

h1{
font-size:50px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff4d6d;
}

#msg{
margin-top:20px;
display:none;
font-size:22px;
}

/* heart */
.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">
<h1>Happy Anniversary ❤️</h1>
<p>ขอบคุณที่อยู่ในชีวิตเรา</p>

<button onclick="show()">กดดูข้อความ</button>

<div id="msg">
รักเธอมากนะ อยู่ด้วยกันไปนาน ๆ 💖
</div>
</div>

<script>

function show(){
document.getElementById("msg").style.display="block"
}

/* heart generator */

function createHeart(){
const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+15)+"px"
heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)
}

setInterval(createHeart,300)

</script>

</body>
</html>
